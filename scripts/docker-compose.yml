services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      # Same variable as graphite-mem (GRAPHITE_NEO4J_PASS); set in repo-root .env or environment.
      NEO4J_AUTH: neo4j/${GRAPHITE_NEO4J_PASS:?GRAPHITE_NEO4J_PASS must be set for Neo4j (e.g. in .env)}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  neo4j_data:
  chroma_data:
