<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Graphite Memory</title>
  <desc id="desc">MCP server for hybrid graph and vector memory</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="55%" stop-color="#121a2e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3d8bfd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)" rx="0"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.9"/>
  <rect x="48" y="48" width="1104" height="204" fill="none" stroke="url(#stroke)" stroke-width="1.5" rx="12" opacity="0.55"/>
  <line x1="72" y1="108" x2="1128" y2="108" stroke="url(#stroke)" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <!-- Title: system-ui stack renders crisply on GitHub -->
  <text x="600" y="92" text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif"
    font-size="52" font-weight="700" letter-spacing="-0.03em" fill="#f0f4fc">Graphite Memory</text>
  <text x="600" y="148" text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20" font-weight="450" fill="#94a3b8" letter-spacing="0.02em">Hybrid graph · vector memory for LLMs via MCP</text>
  <text x="600" y="186" text-anchor="middle"
    font-family="ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace"
    font-size="13" fill="#64748b" letter-spacing="0.12em">CHROMADB  ·  NEO4J  ·  OLLAMA  ·  GO</text>
  <text x="600" y="236" text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="15" font-weight="500" fill="#7dd3fc" opacity="0.95">Model Context Protocol · stdio &amp; HTTP/SSE</text>
</svg>
